# -----------------------------------------------------------------------------
# NAVIXO PAY - lean stack for OrizenPanel-managed deployments
#
# Runs only the 7 core services (no bundled blockchain nodes, no monitoring,
# no backup sidecar) so it fits comfortably beside OrizenPanel on a small host.
# All chains are reached over external RPC / Esplora (zero local storage) via the
# *_RPC_URL / *_ESPLORA_URL values written into .env by the Payment Gateway module.
#
# The edge nginx is published ONLY on the host loopback (127.0.0.1:${NAVIXO_PORT})
# and speaks plain HTTP. Public HTTPS is terminated by Cloudflare (orange-cloud)
# and the OrizenPanel Apache reverse proxy, which forward to that port.
#
# Project name comes from COMPOSE_PROJECT_NAME in .env (one project per domain).
# -----------------------------------------------------------------------------

networks:
  edge:
  core:
    internal: true
  chain:            # non-internal: workers reach external RPC / Esplora endpoints
  signing:
    internal: true

volumes:
  pgdata:
  redisdata:
  signer-keystore:

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${NAVIXO_PORT:-8081}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d-panel:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    networks: [edge]
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_API_BASE: /api/v1
    restart: unless-stopped
    networks: [edge]

  api:
    build: ./backend
    restart: unless-stopped
    command: ["node", "dist/main.js"]
    environment: &backend-env
      NODE_ENV: production
      APP_ROLE: api
      APP_DOMAIN: ${APP_DOMAIN}
      PUBLIC_URL: https://${APP_DOMAIN}
      HTTP_PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
      PANEL_SSO_SECRET: ${PANEL_SSO_SECRET:-}
      SIGNER_URL: http://signer:4000
      SIGNER_HMAC_KEY: ${SIGNER_HMAC_KEY}
      # Zero-storage external endpoints (set in .env by the Payment Gateway module)
      BITCOIN_ESPLORA_URL: ${BITCOIN_ESPLORA_URL:-}
      LITECOIN_ESPLORA_URL: ${LITECOIN_ESPLORA_URL:-}
      # RPC URLs/users are required by config validation; with the Esplora URLs set
      # above they are never actually called (BTC/LTC detected via Esplora).
      BITCOIN_RPC_URL: ${BITCOIN_RPC_URL:-http://bitcoind:8332}
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:-navixo}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:-placeholder}
      LITECOIN_RPC_URL: ${LITECOIN_RPC_URL:-http://litecoind:9332}
      LITECOIN_RPC_USER: ${LITECOIN_RPC_USER:-navixo}
      LITECOIN_RPC_PASSWORD: ${LITECOIN_RPC_PASSWORD:-placeholder}
      ETH_RPC_URL: ${ETH_RPC_URL:-}
      XRPL_WS_URL: ${XRPL_WS_URL:-}
      TRON_HTTP_URL: ${TRON_HTTP_URL:-}
      TRON_API_KEY: ${TRON_API_KEY:-}
      RATE_LIMIT_TTL: "60"
      RATE_LIMIT_MAX: "120"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [edge, core, chain]
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      <<: *backend-env
      APP_ROLE: worker
      HTTP_PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [core, chain, signing]
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  signer:
    build: ./signer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SIGNER_PORT: "4000"
      SIGNER_HMAC_KEY: ${SIGNER_HMAC_KEY}
      SIGNER_KEYSTORE_PASSPHRASE: ${SIGNER_KEYSTORE_PASSPHRASE}
      SIGNER_KEYSTORE_PATH: /keystore
      SIGNER_MAX_WITHDRAWAL_BTC: ${SIGNER_MAX_WITHDRAWAL_BTC:-1.0}
      SIGNER_MAX_WITHDRAWAL_ETH: ${SIGNER_MAX_WITHDRAWAL_ETH:-20}
      SIGNER_MAX_WITHDRAWAL_LTC: ${SIGNER_MAX_WITHDRAWAL_LTC:-100}
      SIGNER_MAX_WITHDRAWAL_XRP: ${SIGNER_MAX_WITHDRAWAL_XRP:-20000}
      SIGNER_MAX_WITHDRAWAL_TRX_USDT: ${SIGNER_MAX_WITHDRAWAL_TRX_USDT:-25000}
      SIGNER_MAX_WITHDRAWAL_ERC20_USDC: ${SIGNER_MAX_WITHDRAWAL_ERC20_USDC:-25000}
    volumes:
      - signer-keystore:/keystore
    networks: [signing]
    healthcheck:
      test: ["CMD", "node", "dist/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=2000
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [core]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
      - --appendonly
      - "yes"
    volumes:
      - redisdata:/data
    networks: [core]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
