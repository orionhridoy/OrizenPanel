server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback (dashboard routes + /checkout/:id). Never cache the HTML shell so
    # dashboard updates + the panel SSO handler always reach the browser immediately
    # (hashed /assets/ stay cached above - they're immutable).
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri /index.html;
    }
}
