# Panel-managed deployment proxy settings. Identical to proxy.conf, except the
# forwarded scheme is pinned to https: in this mode public TLS is terminated by
# Cloudflare (orange-cloud) and the OrizenPanel Apache reverse proxy, and this
# internal nginx is only ever reached over loopback HTTP. The app must still see
# https so it builds correct absolute URLs and marks cookies Secure.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header Connection "";
proxy_connect_timeout 5s;
proxy_send_timeout 30s;
