# Lean edge routing for OrizenPanel-managed Navixo Pay deployments.
# Listens plain HTTP on the container's port 80, published only on the host
# loopback (127.0.0.1:<port>) by docker-compose.panel.yml. Public HTTPS is
# provided by Cloudflare (orange-cloud) + the OrizenPanel Apache reverse proxy,
# which forward to this port. No TLS, no HTTP->HTTPS redirect, no Grafana here.

upstream api_backend {
    server api:3000;
    keepalive 32;
}

upstream dashboard_backend {
    server dashboard:8080;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    limit_conn perip 40;

    # Internal metrics endpoints must never be reachable from the edge
    location ~ ^/(api/)?metrics {
        deny all;
    }

    # Authentication endpoints: strict rate limit (brute-force protection)
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy-panel.conf;
    }

    # Public checkout/invoice endpoints (SSE status stream: buffering off)
    location /api/v1/public/ {
        limit_req zone=checkout burst=30 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy-panel.conf;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Merchant + dashboard API
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/snippets/proxy-panel.conf;
    }

    # Dashboard SPA
    location / {
        proxy_pass http://dashboard_backend;
        include /etc/nginx/snippets/proxy-panel.conf;
    }
}
